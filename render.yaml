# Render Blueprint — free-tier staging API
# The git repo root IS the backend directory, so no rootDir is needed.
# Apply: Dashboard → Blueprints → New Blueprint Instance → connect this repo

services:
  - type: web
    name: newssummary-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: node dist/src/main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OAUTH_GOOGLE_CLIENT_IDS
        sync: false
      - key: SWAGGER_ENABLED
        value: "true"
